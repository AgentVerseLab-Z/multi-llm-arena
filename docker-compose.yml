version: "3.8"

services:
  app:
    build: .
    container_name: multi-llm-arena
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8089}:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:password@localhost:5432/multi_llm_arena?schema=public}
      JWT_SECRET: ${JWT_SECRET:-multi-llm-arena-jwt}
      CAPTCHA_SECRET: ${CAPTCHA_SECRET:-multi-llm-arena-captcha}
    volumes:
      - app-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  app-data:
