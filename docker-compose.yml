version: "3.8"

services:
  app:
    build: .
    container_name: multi-llm-arena
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8089}:3000"
    environment:
      DATABASE_URL: postgresql://${PG_USER:-arena}:${PG_PASSWORD:-ch…@${PG_HOST:-localhost}:${PG_PORT:-5432}/${PG_DATABASE:-multi_llm_arena}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me}
      CAPTCHA_SECRET: ${CAPTCHA_SECRET:-change-me}
      # API Key 可在页面配置，也可在此预设（非必需）
      # DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      # DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # BOCHA_API_KEY: ${BOCHA_API_KEY:-}
    volumes:
      - app-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  app-data:
