version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: multi-llm-pgsql
    restart: unless-stopped
    environment:
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: multi_llm_arena
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arena -d multi_llm_arena"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: multi-llm-arena
    restart: unless-stopped
    ports:
      - "8089:3000"
    environment:
      DATABASE_URL: postgresql://arena:${POSTGRES_PASSWORD:-changeme}@postgres:5432/multi_llm_arena?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CAPTCHA_SECRET: ${CAPTCHA_SECRET:-change-me-in-production}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      BOCHA_API_KEY: ${BOCHA_API_KEY:-}
    volumes:
      - app-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  app-data:
